[Logging]

; Master switch for all logging to Papyrus.0.log.
EnableLogging=0

; Logging verbosity level written to log file.
; 0=Off, 1=Errors only, 2=Info, 3=Debug (verbose).
LogLevel=2

; Also show enabled log messages as in-game notifications.
EnableLogNotifications=0


[Config]

; Disable menu shown on death.
DisableDeathMessage=0

; Disable dragon soul auto-revive mechanic entirely.
DisableDragonSoulRevive=0

; Disable menu shown when dragon soul revive.
DisableDragonSoulReviveMessage=0

; Disable writing to Character Journal log file.
; File: Data/SKSE/Plugins/IronSoulCharacterJournal.log
DisableCharacterJournalLog=0

; Disable initial mod introduction menu on first death.
DisableIronSoulIntro=0

; Disable Luck system. Respawn becomes fixed 60 minute timer instead of chance-based.
DisableLuckSystem=0

; Disable all sound effects.
DisableSFX=0

; Disable all respawn compatibility and mechanics.
DisableRespawn=0

; Disable menu shown on respawn.
DisableRespawnMessage=0

; Controls post-load notification style.
; 0=Default, 1=No flavour text, 2=Flavour only, 3=Disabled.
LoadNotificationMode=0

; Controls Luck recovery reminder notification style.
; 0=Flavour text, 1=Basic text, 2=Disabled.
LuckReminderNotificationMode=0

; Enables safe uninstall mode.
; Load → Wait → Save → Remove mod or leave disabled.
UninstallMode=0


[Feats]

; Disable Defiant Soul feat (100-death mode unlocked after first dragon soul).
DisableDefiantFeat=0

; Disable all Soul Feats progression and unlocks.
DisableSoulFeats=0

; Disable all Soul Bonus stat bonuses.
DisableSoulBonus=0

; Disable dragon soul anti-cheat detection system.
DisableDragonSoulAnticheat=0


[Endless]

; Enable Endless mode (infinite lives, permadeath not enforced).
CHIM=0


[Experimental]

; Enables compatibility with Character Sheet mod.
; Uses deprecated actor value DEPRECATED05 to sync death count.
EnableCharacterSheetCompatibility=0
